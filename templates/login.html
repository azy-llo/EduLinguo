{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<div class="auth-page">
  <a href="{{ url_for('skip_auth') }}" class="auth-skip" title="Закрыть" aria-label="Закрыть и перейти к курсам">×</a>
  <div class="container auth-wrap">
    <div class="card auth-card duo-card">
      <h1>Вход</h1>
      <p class="muted">Нет аккаунта? <a href="{{ url_for('register') }}">Регистрация</a></p>
      <form method="post" class="form" action="{{ url_for('login') }}">
        <label>
          Email
          <input type="email" name="email" required autocomplete="email" placeholder="you@example.com">
        </label>
        <label>
          Пароль
          <input type="password" name="password" required autocomplete="current-password" minlength="6">
        </label>
        <button type="submit" class="btn btn-primary btn-block">Войти</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
